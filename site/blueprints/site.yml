title: Site

options:
  changeTitle: true

# The Site view is the editor's home: it mirrors the public homepage (identity +
# content) and carries the two site-wide live switches. Page navigation lives in
# the Panel menu; all media is managed on the Media page.
columns:
  # Full-width dashboard strip on top — counts + a magnet health warning that
  # lights up if any library-item or magnet-video has a browser-unreachable tracker.
  overview:
    width: 1/1
    sections:
      stats:
        type: stats
        reports:
          - label: Articles
            value: "{{ site.find('articles').children.listed.count }}"
            icon: pen
            link: pages/articles
          - label: Library items
            value: "{{ site.libraryItemCount }}"
            icon: file
            link: pages/library
          - label: Fraternals
            value: "{{ site.fraternalCount }}"
            icon: users
            link: pages/fraternals
          - label: Videos
            value: "{{ site.videoCount }}"
            icon: video
            link: pages/videos
          - label: Broken magnets
            value: "{{ site.brokenMagnetCount }}"
            info: missing wss:// tracker
            icon: alert
            theme: negative

  # Col 1 — identity + the home-page content (this is what the public homepage shows).
  identity:
    width: 1/3
    sections:
      meta:
        type: fields
        fields:
          tagline:
            label: Tagline
            type: text
            translate: true
            placeholder: Short tagline
          logo:
            label: Sidebar logo
            type: files
            multiple: false
            query: site.images
            uploads:
              template: image
            help: >
              Drop one to upload (or manage all media on the Media page).
              Defaults to the bundled sign image if empty. Monochrome works
              best — the sidebar inverts it in dark mode.
      homecontent:
        type: fields
        fields:
          body:
            label: Content
            type: blocks
            translate: true
            help: Intro paragraph + optional images. Renders on the home page above the featured list.
            fieldsets:
              - text
              - image
          featured:
            label: Featured articles (up to 5)
            type: pages
            query: site.find("articles").children.listed
            multiple: true
            max: 5
            layout: list
            info: "{{ page.date.toDate('Y-m-d') }} · {{ page.sku }}"
            help: Hand-picked. Leave empty to auto-show the latest articles.

  # Col 2 — live operations: the two site-wide switches, each with a link to its
  # settings page. The switches read identically in every language (not translated).
  live:
    width: 1/3
    sections:
      switches:
        type: fields
        fields:
          broadcast_on:
            label: Live broadcast
            type: toggle
            text:
              - "Off — no broadcast"
              - "On — player shows on home"
            default: false
            translate: false
            icon: video
            help: Master switch. The player appears on the home page after a rebuild.
          broadcast_link:
            label: Broadcast settings
            type: info
            theme: passive
            text: "[→ Go live / manage room & key](/panel/pages/broadcast)"
          ticker_on:
            label: Live news ticker
            type: toggle
            text:
              - "Off — no crawl"
              - "On — crawl shows site-wide"
            default: false
            translate: false
            icon: bell
            help: Scrolling news crawl pinned to the top of every page.
          ticker_link:
            label: Sources
            type: info
            theme: passive
            text: "[→ Manage the four crawl sources](/panel/pages/news-ticker)"

  # Col 3 — quick access to the Library tree + the video table.
  browse:
    width: 1/3
    sections:
      library_link:
        type: info
        label: Library
        theme: passive
        text: "[→ Open the Library tree](/panel/pages/library)"
      videos:
        type: pages
        headline: Videos
        parent: site.find("videos")
        template: video
        status: all
        sortBy: date desc
        layout: table
        columns:
          date:
            label: Date
            type: text
            value: "{{ page.date.toDate('Y-m-d') }}"
            width: 1/3
        create:
          template: video
        empty: No videos yet. Use + to add one.
