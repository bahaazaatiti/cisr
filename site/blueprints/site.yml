title: Site

options:
  changeTitle: true

columns:
  - width: 1/3
    sections:
      meta:
        type: fields
        fields:
          tagline:
            label: Tagline
            type: text
            translate: true
            placeholder: Short tagline
          logo:
            label: Sidebar logo
            type: files
            multiple: false
            uploads:
              template: image
            help: >
              Defaults to the bundled sign image if empty. A monochrome image
              works best — the sidebar inverts it in dark mode.
      logo_files:
        type: files
        headline: Site files
        template: image
        layout: cards
        info: "{{ file.dimensions }} · {{ file.niceSize }}"
        empty: Upload a logo here, then pick it in the Sidebar logo field above.
      navigation:
        type: pages
        headline: Pages
        status: all
        templates:
          - home
          - articles
          - library
          - videos
          - fraternals
        info: "{{ page.intendedTemplate.name }}"

  - width: 2/3
    sections:
      articles:
        type: pages
        headline: Articles
        parent: site.find("articles")
        template: article
        status: all
        sortBy: date desc
        limit: 20
        info: "{{ page.date.toDate('Y-m-d') }} · {{ page.sku }}"
        create:
          template: article
          redirect: true
