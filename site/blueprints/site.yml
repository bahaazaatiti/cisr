title: Site

options:
  changeTitle: true

# The Site view is the editor's home, organised as tabs: the Dashboard (identity
# + home content + the two live switches) and a tab per live feature (Broadcast,
# News ticker). Those features used to be panel-only pages — keeping their config
# ON the site model means they can never leak into page queries, the sitemap, or
# the static build (no per-template skips to remember). Page navigation lives in
# the Panel menu; all media is managed on the Media page.
tabs:
  dashboard:
    label: Dashboard
    icon: home
    columns:
      # Full-width strip — counts + a magnet health warning that lights up if any
      # library-item or magnet-video has a browser-unreachable tracker.
      overview:
        width: 1/1
        sections:
          stats:
            type: stats
            reports:
              - label: Articles
                value: "{{ site.find('articles').children.listed.count }}"
                icon: pen
                link: pages/articles
              - label: Library items
                value: "{{ site.libraryItemCount }}"
                icon: file
                link: pages/library
              - label: Fraternals
                value: "{{ site.fraternalCount }}"
                icon: users
                link: pages/fraternals
              - label: Videos
                value: "{{ site.videoCount }}"
                icon: video
                link: pages/videos
              - label: Broken magnets
                value: "{{ site.brokenMagnetCount }}"
                info: missing wss:// tracker
                icon: alert
                theme: negative

      # Col 1 — identity + the home-page content (what the public homepage shows).
      identity:
        width: 1/3
        sections:
          meta:
            type: fields
            fields:
              tagline:
                label: Tagline
                type: text
                translate: true
                placeholder: Short tagline
              logo:
                label: Sidebar logo
                type: files
                multiple: false
                query: site.images
                uploads:
                  template: image
                help: >
                  Drop one to upload (or manage all media on the Media page).
                  Defaults to the bundled sign image if empty. Monochrome works
                  best — the sidebar inverts it in dark mode.
          homecontent:
            type: fields
            fields:
              featured:
                label: Featured articles (up to 5)
                type: pages
                query: site.find("articles").children.listed
                multiple: true
                max: 5
                layout: list
                info: "{{ page.date.toDate('Y-m-d') }} · {{ page.sku }}"
                help: Hand-picked. Leave empty to auto-show the latest articles.

      # Col 2 — the two site-wide live switches, each linking to its own tab.
      live:
        width: 1/3
        sections:
          switches:
            type: fields
            fields:
              broadcast_on:
                label: Live broadcast
                type: toggle
                text:
                  - "Off — no broadcast"
                  - "On — player shows on home"
                default: false
                translate: false
                icon: video
                help: Master switch. The player appears on the home page after a rebuild.
              ticker_on:
                label: Live news ticker
                type: toggle
                text:
                  - "Off — no crawl"
                  - "On — crawl shows site-wide"
                default: false
                translate: false
                icon: bell
                help: Scrolling news crawl pinned to the top of every page.
          content:
            type: fields
            fields:
              body:
                label: Content
                type: blocks
                translate: true
                help: Intro paragraph + optional images. Renders on the home page above the featured list.
                fieldsets:
                  - text
                  - image

      # Col 3 — quick access to the Library tree + the video table.
      browse:
        width: 1/3
        sections:
          library_link:
            type: info
            label: Library
            theme: passive
            text: "[→ Open the Library tree](/panel/pages/library)"
          videos:
            type: pages
            headline: Videos
            parent: site.find("videos")
            template: video
            status: all
            sortBy: date desc
            layout: table
            columns:
              date:
                label: Date
                type: text
                value: "{{ page.date.toDate('Y-m-d') }}"
                width: 1/3
            create:
              template: video
            empty: No videos yet. Use + to add one.

  # ── Broadcast — config on the site model, never a page ───────────────────
  # The on/off master switch is on the Dashboard tab; this tab holds the room +
  # signing identity for the homepage live-broadcast hero. broadcast_active()
  # ANDs the toggle + room + key. Reached via the Dashboard's "Manage broadcast".
  broadcast:
    label: Broadcast
    icon: video
    columns:
      - width: 1/1
        sections:
          settings:
            type: fields
            fields:
              broadcast_room:
                label: Room name
                type: text
                translate: false
                icon: key
                placeholder: e.g. cisr-live-7fq2
                help: >
                  Pick a non-obvious name and change it per broadcast. Viewers
                  join this room automatically; you join the same name in COMMS.
              broadcast_relay:
                label: Hide viewer IPs (TURN relay)
                type: toggle
                text:
                  - "Off — direct (viewer IP visible)"
                  - "On — relayed (viewer IP hidden)"
                default: false
                translate: false
                icon: lock
                help: >
                  On routes viewers through a TURN relay so their IP is hidden
                  from peers. Needs a TURN server in TRACKERS.md (## Turn).
              genkey:
                label: Broadcast identity
                type: info
                theme: positive
                text: >
                  **[⤓ Generate broadcast identity](/panel/broadcast/genkey)** —
                  creates a key pair: the public key is saved below automatically,
                  your private key downloads as a .txt. Keep it safe; it is never
                  stored on the server.
              broadcast_pubkey:
                label: Public key (auto-filled — do not edit)
                type: textarea
                translate: false
                font: monospace
                buttons: false
                help: Filled by Generate. Viewers verify your stream against this.

  # ── News ticker — config on the site model, never a page ─────────────────
  # The on/off master switch is on the Dashboard tab; this tab holds the crawl
  # sources + hand-written lines + live-news rooms. Per-language (switch language
  # top-right) except live-news rooms, which are global like the broadcast.
  news-ticker:
    label: News ticker
    icon: bell
    columns:
      - width: 1/1
        sections:
          intro:
            type: info
            label: How the crawl works
            theme: info
            text: |
              Turn the crawl on or off from the **Dashboard** tab. It scrolls
              across the top of every page.

              **Telegram** and **Twitter / X** are fetched **live in the visitor's
              browser** — just paste the channel's `t.me` link or the profile's
              `x.com` link. No accounts, no setup. It's best-effort: Telegram is
              reliable; X rides public mirrors that come and go, so that lane may
              sometimes stay empty. If a lane won't load, switch it Off.

              **Breaking news** is the one hand-written lane — type the lines
              yourself; they show instantly.

              Everything is per-language: switch language (top-right) to point at
              the Arabic or French channels and write the Arabic/French lines.

      - width: 1/2
        sections:
          feeds:
            type: fields
            fields:
              telegram:
                extends: fields/ticker-feed
                label: Telegram
                empty: No Telegram channels yet — paste a t.me link.
              twitter:
                extends: fields/ticker-feed
                label: Twitter / X
                empty: No X profiles yet — paste an x.com link.

      - width: 1/2
        sections:
          manual:
            type: fields
            fields:
              breaking:
                extends: fields/ticker-news
                label: Breaking news (hand-written)
                empty: No breaking-news lines yet — add one.

      - width: 1/1
        sections:
          livenews:
            type: fields
            fields:
              livenews_on:
                label: Live news (signed P2P chat)
                type: toggle
                text:
                  - "Off"
                  - "On — a signed editor can type into the crawl"
                default: false
                translate: false
                icon: bolt
                help: >
                  When on (and the ticker is on), a trusted editor who loads the
                  matching private key on the site (COMMS → WHO'S HERE) can type
                  lines straight into the crawl, live — no rebuild. Each verified
                  line shows with a flickering dot.
              livenews_room:
                label: Room name
                type: text
                translate: false
                icon: key
                placeholder: e.g. cisr-live-7fq2
                help: >
                  The Trystero room the signed editor types in. Pick a non-obvious
                  name and change it per session — anyone with the name can join.
              livenews_label:
                label: Label
                type: text
                translate: false
                icon: tag
                help: Short prefix shown before each live line in the crawl (e.g. CISR LIVE).
              livenews_genkey:
                label: Live-news identity
                type: info
                theme: positive
                text: >
                  **[⤓ Generate live-news identity](/panel/ticker/genkey)** —
                  creates a key pair: the public key is saved below automatically,
                  your private key downloads as a .txt. Keep it safe; it is never
                  stored on the server.
              livenews_pubkey:
                label: Public key (auto-filled — do not edit)
                type: textarea
                translate: false
                font: monospace
                buttons: false
                help: >
                  Filled by Generate. The crawl shows only chat signed by the
                  matching private key.
