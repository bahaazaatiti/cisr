title: Video

icon: video

options:
  preview: false
  changeTemplate: false

# Date-prefixed filename so listings stay stable across forks.
num: '{{ page.date.toDate("Ymd") }}'

status:
  draft:
    label: Draft
    text: Hidden everywhere. Not exported to the static site.
  unlisted:
    label: Unlisted
    text: Reachable by direct URL but hidden from the videos listing.
  listed:
    label: Listed
    text: |
      Shown in the videos listing. Whether it gets its own player page
      is automatic: fill the Notes body and it becomes a "rich entry"
      (own player page). Leave Notes empty and it stays "lean" (row only).

tabs:
  source:
    label: Source
    icon: download
    columns:
      - width: 2/3
        fields:
          source_type:
            label: Source
            type: radio
            required: true
            translate: false
            default: youtube
            options:
              youtube: YouTube
              magnet:  Magnet (WebTorrent)
            help: Choose the delivery channel. Each video uses exactly one.

          youtube_url:
            label: YouTube URL
            type: url
            translate: false
            placeholder: https://www.youtube.com/watch?v=...
            help: Paste any youtube.com or youtu.be link. The video ID is auto-extracted.
            when:
              source_type: youtube

          magnet:
            label: Magnet link
            type: text
            translate: false
            placeholder: "magnet:?xt=urn:btih:..."
            help: >
              Paste a BitTorrent magnet URI. Must include at least one `wss://`
              tracker (browsers need WebSocket trackers to find peers).
            when:
              source_type: magnet

          summary:
            label: Summary
            type: textarea
            translate: true
            size: small
            help: One or two sentences. Shown in the listing and as the meta description.

      - width: 1/3
        fields:
          date:
            label: Date
            type: date
            default: today
            time: false
            translate: false
            help: Publication date. Drives the on-disk filename and the listing sort.
          duration:
            label: Duration
            type: text
            placeholder: "00:00"
            translate: false
            help: Display string only — not validated. e.g. 12:34 or 1:23:45

  notes:
    label: Notes
    icon: text
    fields:
      notes:
        label: Notes
        type: textarea
        size: huge
        translate: true
        help: >
          Longer description, transcript, source, commentary, etc. **Filling
          this turns the video into a "rich entry"** — Kirby renders a
          standalone player page for it (otherwise it's just a row in the
          parent listing).
