title: Video

icon: video

options:
  preview: false
  changeTemplate: false

columns:
  - width: 2/3
    fields:
      source_type:
        label: Source
        type: radio
        required: true
        translate: false
        default: youtube
        options:
          youtube: YouTube
          magnet:  Magnet (WebTorrent)
        help: Choose the delivery channel. Each video uses exactly one.

      youtube_url:
        label: YouTube URL
        type: url
        translate: false
        placeholder: https://www.youtube.com/watch?v=...
        help: Paste any youtube.com or youtu.be link. The video ID is auto-extracted.
        when:
          source_type: youtube

      magnet:
        label: Magnet link
        type: text
        translate: false
        placeholder: "magnet:?xt=urn:btih:..."
        help: >
          Paste a BitTorrent magnet URI. It must include at least one `wss://`
          tracker (browsers need WebSocket trackers to find peers).
        when:
          source_type: magnet

      summary:
        label: Summary
        type: textarea
        translate: true
        size: small

  - width: 1/3
    fields:
      date:
        label: Date
        type: date
        default: today
        time: false
      duration:
        label: Duration
        type: text
        placeholder: "00:00"
