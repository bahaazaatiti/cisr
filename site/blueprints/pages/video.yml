title: Video

icon: video

options:
  preview: false
  changeTemplate: false

columns:
  - width: 2/3
    fields:
      youtube_url:
        label: YouTube URL
        type: url
        required: true
        placeholder: https://www.youtube.com/watch?v=...
        help: Paste any youtube.com or youtu.be link. The video ID is auto-extracted.
      summary:
        label: Summary
        type: textarea
        translate: true
        size: small
  - width: 1/3
    fields:
      date:
        label: Date
        type: date
        default: today
        time: false
      duration:
        label: Duration
        type: text
        placeholder: "00:00"
