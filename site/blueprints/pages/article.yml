title: Article

options:
  changeTemplate: false
  preview: true

columns:
  - width: 2/3
    fields:
      body:
        label: Body
        type: blocks
        translate: true
        fieldsets:
          - heading
          - text
          - list
          - quote
          - code
          - image
          - line
          - markdown
  - width: 1/3
    fields:
      date:
        label: Date
        type: date
        default: today
        time: false
      sku:
        label: SKU
        type: text
        placeholder: SKU-XXX
        translate: false
      summary:
        label: Summary
        type: textarea
        size: small
        translate: true
