title: Library

options:
  preview: true
  changeTemplate: false

icon: folder

columns:
  - width: 1/3
    fields:
      description:
        label: Folder description
        type: textarea
        size: small
        translate: true
        help: Optional intro shown above the listing.
  - width: 2/3
    sections:
      children:
        extends: sections/pages-by-status
        headline: Contents
        # Library is a tree browser, not a publish queue — show every child
        # regardless of draft/unlisted/listed.
        status: all
        # Two templates: Kirby auto-shows a folder-vs-file picker on +.
        # Do NOT set `create:` here — that pins a single template.
        templates:
          - library
          - library-item
        sortBy: title asc
        info: "{{ page.kind.or(page.intendedTemplate) }}"
        empty: Empty folder. Add a subfolder or a file.
