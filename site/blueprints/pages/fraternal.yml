title: Fraternal Organization

options:
  changeTemplate: false
  preview: true

icon: users

status:
  draft:
    label: Draft
    text: Hidden everywhere. Not exported to the static site.
  unlisted:
    label: Unlisted
    text: Reachable by direct URL but hidden from the fraternals listing.
  listed:
    label: Listed
    text: |
      Shown in the fraternals listing. Whether it gets its own standalone
      page is automatic: fill the Notes body and it becomes a "rich entry"
      (own page). Leave Notes empty and it stays "lean" (row only).

tabs:
  identity:
    label: Identity
    icon: tag
    columns:
      - width: 2/3
        fields:
          native_name:
            label: Native name
            type: text
            translate: false
            placeholder: e.g. منظمة الشيوعية الجزائرية
            help: The organization's name in its own script. Leave blank if same as title.
          homepage:
            label: Homepage URL
            type: url
            required: true
            translate: false
            placeholder: https://...
            help: Public URL. Must be reachable.
          summary:
            label: Summary
            type: textarea
            size: small
            translate: true
            help: One or two sentences describing the organization.
      - width: 1/3
        fields:
          sku:
            label: SKU
            type: text
            placeholder: SKU/FRA-XXX
            translate: false
            help: Stable identifier shared across languages. Renders as the badge.
          affinity:
            label: Affinity
            type: select
            required: true
            translate: false
            default: aligned
            options:
              sister:     Sister section
              aligned:    Aligned organization
              friendly:   Friendly publication
              historical: Historical / archive
            help: Drives grouping on the listing page.
          type:
            label: Type
            type: select
            translate: false
            options:
              party:        Party
              journal:      Journal
              publication:  Publication
              study-circle: Study circle
              collective:   Collective
              archive:      Archive
              other:        Other
            help: Organizational form.

  context:
    label: Context
    icon: globe
    columns:
      - width: 1/2
        fields:
          region:
            label: Region
            type: text
            translate: false
            placeholder: e.g. Algeria, Italy, International
            help: Geography or scope. Free text.
          founded:
            label: Founded
            type: text
            translate: false
            placeholder: e.g. 1976 or 1976–1995
            help: Year or year range. Free text.
      - width: 1/2
        fields:
          languages:
            label: Languages
            type: tags
            translate: false
            accept: options
            options:
              ar: AR
              en: EN
              fr: FR
              it: IT
              es: ES
              pt: PT
              de: DE
              tr: TR
              fa: FA
              ku: KU
            help: Publishing languages.
          verified:
            label: Last verified
            type: date
            time: false
            translate: false
            default: today
            help: Set when you last manually checked the homepage is alive.

  notes:
    label: Notes
    icon: text
    fields:
      notes:
        label: Notes
        type: textarea
        size: huge
        translate: true
        help: >
          Longer commentary. **Filling this turns the entry into a "rich
          entry"** — Kirby renders a standalone static page for it (otherwise
          it's just a row in the parent listing).
