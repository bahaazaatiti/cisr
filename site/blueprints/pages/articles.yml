title: Articles

options:
  changeSlug: false
  changeTemplate: false
  delete: false
  preview: true

icon: book

sections:
  drafts:
    extends: sections/pages-by-status
    headline: Drafts
    status: draft
    template: article
    info: "{{ page.date.toDate('Y-m-d') }}"
    empty: No drafts yet. Use + to start one.
  published:
    extends: sections/pages-by-status
    headline: Published
    status: listed
    template: article
    sortBy: date desc
    info: "{{ page.date.toDate('Y-m-d') }} · {{ page.sku }}"
    empty: Nothing published yet.
