title: Home

options:
  changeSlug: false
  changeStatus: false
  changeTemplate: false
  delete: false
  preview: true

columns:
  - width: 1/2
    sections:
      meta:
        type: fields
        fields:
          body:
            label: Content
            type: blocks
            translate: true
            fieldsets:
              - text
              - image
          featured:
            label: Featured articles (up to 5)
            type: pages
            query: site.find("articles").children.listed
            multiple: true
            max: 5
            layout: list
            info: "{{ page.date.toDate('Y-m-d') }} · {{ page.sku }}"
      home_files:
        type: files
        headline: Page files
        template: image
        layout: cards
        info: "{{ file.dimensions }} · {{ file.niceSize }}"
        empty: Upload images here, then pick them inside an image block.
  - width: 1/2
    sections:
      latest:
        type: pages
        headline: Latest articles
        parent: site.find("articles")
        template: article
        status: listed
        sortBy: date desc
        limit: 5
        info: "{{ page.date.toDate('Y-m-d') }} · {{ page.sku }}"
        create:
          template: article
          redirect: true
