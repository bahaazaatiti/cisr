# Thin shell — the homepage's content lives on the Site dashboard (site model).
# content/home/home.*.txt must EXIST even though it's near-empty: Kirby derives a
# page's template from its content filename, so deleting it drops home to the
# default template. Locked from panel deletion below.
title: Home
icon: home

options:
  changeSlug: false
  changeStatus: false
  changeTemplate: false
  delete: false
  preview: true

sections:
  moved:
    type: info
    label: Home content lives on the Site dashboard
    theme: info
    text: |
      The homepage's content — intro text, featured articles, and the live
      news-ticker / broadcast switches — is now edited on the **[Site
      dashboard](/panel/site)**. This page itself has no settings.
