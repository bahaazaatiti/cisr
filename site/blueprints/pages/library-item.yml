title: Library item

options:
  preview: true
  changeTemplate: false

icon: file

columns:
  - width: 2/3
    fields:
      magnet:
        label: Magnet link
        type: text
        required: true
        translate: false
        placeholder: "magnet:?xt=urn:btih:..."
        help: >
          Paste a BitTorrent magnet URI. It must include at least one `wss://`
          (WebSocket) tracker — browsers can't reach UDP/HTTP trackers. See
          .claude/howto-seeders.md.
      summary:
        label: Summary
        type: textarea
        size: small
        translate: true
        help: One or two sentences describing the file.
      notes:
        label: Notes (optional)
        type: textarea
        size: medium
        translate: true
        help: Longer description, table of contents, source, etc.
  - width: 1/3
    fields:
      kind:
        label: Kind
        type: select
        required: true
        translate: false
        default: pdf
        options:
          pdf:     PDF
          epub:    EPUB
          audio:   Audio
          video:   Video
          image:   Image
          archive: Archive
          other:   Other
        help: Drives the icon and player choice.
      size_human:
        label: Size
        type: text
        translate: false
        placeholder: e.g. 12 MB
        help: Display string only — not validated.
      language:
        label: Language(s)
        type: tags
        translate: false
        accept: options
        options:
          ar: AR
          en: EN
          fr: FR
          it: IT
          es: ES
          pt: PT
          de: DE
          ru: RU
          tr: TR
          fa: FA
          ku: KU
      added:
        label: Added
        type: date
        time: false
        translate: false
        default: today
