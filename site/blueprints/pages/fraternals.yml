title: Fraternal Organizations

icon: globe

options:
  changeSlug: false
  changeTemplate: false
  delete: false
  preview: true

columns:
  - width: 1/3
    fields:
      intro:
        label: Intro
        type: textarea
        size: medium
        translate: true
        help: Optional intro paragraph shown above the listing.
  - width: 2/3
    sections:
      drafts:
        extends: sections/pages-by-status
        headline: Drafts
        status: draft
        template: fraternal
        info: "{{ page.affinity }} · {{ page.region }}"
        empty: No drafts yet.
      published:
        extends: sections/pages-by-status
        headline: Published
        status: listed
        template: fraternal
        sortBy: sku asc
        info: "{{ page.affinity }} · {{ page.region }} · {{ page.homepage }}"
        empty: Nothing published yet.
