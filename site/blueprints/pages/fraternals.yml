title: Fraternal Organizations

icon: globe

options:
  changeSlug: false
  changeTemplate: false
  delete: false
  preview: true

columns:
  - width: 1/3
    fields:
      intro:
        label: Intro
        type: textarea
        size: medium
        translate: true
  - width: 2/3
    sections:
      drafts:
        type: pages
        headline: Drafts
        status: draft
        template: fraternal
        info: "{{ page.affinity }} · {{ page.region }}"
        create:
          template: fraternal
          redirect: true
      published:
        type: pages
        headline: Published
        status: listed
        template: fraternal
        sortBy: sku asc
        info: "{{ page.affinity }} · {{ page.region }} · {{ page.homepage }}"
        create:
          template: fraternal
          redirect: true
