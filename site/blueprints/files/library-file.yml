title: Library file

accept:
  # Restrict uploads to a publishing-safe subset. Extend here if editors need more.
  extension:
    - pdf
    - epub
    - doc
    - docx
    - odt
    - rtf
    - txt
    - md
    - csv
    - xls
    - xlsx
    - ods
    - ppt
    - pptx
    - odp
    - jpg
    - jpeg
    - png
    - gif
    - webp
    - svg
    - mp3
    - wav
    - flac
    - m4a
    - mp4
    - webm
    - mov
    - zip

fields:
  label:
    label: Display title
    type: text
    translate: true
  caption:
    label: Caption (optional)
    type: text
    translate: true
